<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="profile-page">

<header>
  <h2>My Projects</h2>

  <div class="profileHeader">
  <img id="profilePicView" class="avatarLarge">
  <h2 id="profileName"></h2>
</div>
  <div>
    <a href="/">Home</a>
    
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div id="myProjects" class="grid"></div>

<h3>Edit Project</h3>

<input type="hidden" id="editId">
<input id="editTitle" placeholder="Title">
<textarea id="editDescription" placeholder="Description"></textarea>
<input id="editTechnologies" placeholder="Tech">
<div id="editImagesPreview" class="editImages"></div>


<button onclick="updateProject()">Update</button>
<script type="module" src="/js/utils.js"></script>
<script type="module" src="/js/config.js"></script>
<script type="module" src="/js/profile.js"></script>
<script type="module" src="/js/toast.js"></script>
<div id="toast-container"></div>
</body>
</html>
